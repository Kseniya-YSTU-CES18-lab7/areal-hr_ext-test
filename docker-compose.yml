version: '3.8'
services:
  # Сервис базы данных PostgreSQL
  db:
    image: postgres:17-alpine           
    container_name: areal_hr_db        
    environment:                       
      POSTGRES_USER: postgres         
      POSTGRES_PASSWORD: 159753    
      POSTGRES_DB: hr_management_db
    ports:
      - "5432:5432"                      
    volumes:
      - pgdata:/var/lib/postgresql/data 

volumes:
  pgdata:                               